services:
  nginx:
    image: nginx:latest
    volumes:
      - ../:/var/www/
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always

  app:
    user: 1001:1001
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ../:/var/www/
    restart: always

  db:
    image: mysql:latest
    restart: always
    volumes:
      - ../../mysqlVuejs:/var/lib/mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: yes


  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    ports:
      - "8081:80"
